# Email Header Forensics — nginx site config (baked into the image).
# The full security-header set is attached here, so the deployment is
# platform-independent: wherever this container runs, the headers run.

# Security headers (declared once, applied to every response below).
# NOTE ON HSTS: it is intentionally NOT set here. Browsers ignore HSTS on
# plain http://localhost, and setting it from a container that may sit
# behind an unknown proxy can poison a whole hostname. Enable it at your
# TLS terminator (reverse proxy) — see docs/SETUP.md §6.

map $sent_http_content_type $csp {
    default "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self' https://dns.google https://cloudflare-dns.com; frame-ancestors 'none'; base-uri 'self'; form-action 'none'; object-src 'none'";
}

server {
    listen       8080;
    listen  [::]:8080;
    server_name  _;

    root  /usr/share/nginx/html;
    index index.html;

    # ---- privacy: no access logging of visitors ----
    access_log off;
    error_log  /dev/stderr warn;

    # ---- hide server version ----
    server_tokens off;

    # ---- security headers on every response ----
    add_header Content-Security-Policy $csp always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;

    # ---- compression ----
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Hashed, immutable build assets: cache forever
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        # add_header does not inherit across levels — restate the set
        add_header Content-Security-Policy $csp always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
        try_files $uri =404;
    }

    # App shell: never cache, always fetch fresh index.html
    location / {
        add_header Cache-Control "no-store" always;
        add_header Content-Security-Policy $csp always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
        try_files $uri /index.html;
    }
}
