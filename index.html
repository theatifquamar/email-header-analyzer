<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      Strict CSP. The only network egress the page is ALLOWED to make is
      DNS-over-HTTPS to dns.google and cloudflare-dns.com (optional feature,
      analyst can disable in the UI). Everything else is same-origin only.
      This is enforced by the browser, so even a compromised dependency
      could not exfiltrate pasted headers anywhere else.
      'unsafe-inline' for styles is required because the app uses inline
      style attributes and a <style> element; there is no inline script.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self' https://dns.google https://cloudflare-dns.com; frame-ancestors 'none'; base-uri 'self'; form-action 'none'; object-src 'none'"
    />
    <meta name="referrer" content="no-referrer" />
    <meta name="robots" content="index,follow" />
    <meta
      name="description"
      content="Privacy-first email header analysis for SOC analysts. SPF, DKIM, DMARC, Received-chain and transport-path forensics — processed entirely in your browser, nothing stored or transmitted."
    />
    <title>Header Forensics — email header triage for SOC analysts</title>
  </head>
  <body>
    <div id="root"></div>
    <noscript>
      Header Forensics runs entirely in your browser and requires JavaScript.
      No data is sent to any server.
    </noscript>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
